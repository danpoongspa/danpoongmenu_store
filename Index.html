<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Danpoong Spa — Course Menu</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+JP:wght@500;600&family=Noto+Serif+TC:wght@500;600&family=Noto+Serif+KR:wght@500;600&display=swap');

  /* 언어별 세리프/산세리프 변수 */
  :root{ --serif:'Cormorant Garamond',serif; --sans:'Jost',sans-serif; }
  body.lang-ja{ --serif:'Noto Serif JP',serif; --sans:'Noto Sans JP',sans-serif; }
  body.lang-zh{ --serif:'Noto Serif TC',serif; --sans:'Noto Sans TC',sans-serif; }
  body.lang-ko{ --serif:'Noto Serif KR',serif; --sans:'Noto Sans KR',sans-serif; }

  :root{
    --bg:#edece2;
    --paper:#f3f2ea;
    --paper2:#e9e7da;
    --ink:#2c3120;
    --soft:#525a3e;
    --muted:#8d917c;
    --line:#d4d2c2;
    --line2:#c3c2af;
    --green:#5f7435;
    --deep:#404B30;
    --green-soft:#7c8456;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{-webkit-text-size-adjust:100%;}
  body{
    background:var(--bg);color:var(--ink);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;min-height:100vh;
  }

  .stage{max-width:1220px;margin:0 auto;padding:34px 40px 48px;}

  /* header */
  header.head{
    display:flex;align-items:center;justify-content:space-between;
    padding-bottom:22px;margin-bottom:18px;border-bottom:1px solid var(--line);
    gap:24px;flex-wrap:wrap;
  }
  .logo{height:34px;width:auto;display:block;}
  .langbar{display:flex;gap:8px;}
  .langbtn{
    all:unset;cursor:pointer;
    font-family:var(--sans);font-weight:500;
    font-size:13px;letter-spacing:.5px;
    padding:8px 16px;border-radius:40px;
    border:1px solid var(--line2);color:var(--soft);
    transition:background .25s,color .25s,border-color .25s;
    white-space:nowrap;
  }
  .langbtn:hover{border-color:var(--green);color:var(--green);}
  .langbtn.active{background:var(--deep);color:#f3f2ea;border-color:var(--deep);}

  .subbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .menu-word{font-family:var(--sans);font-weight:500;font-size:13px;letter-spacing:5px;text-transform:uppercase;color:var(--green);}
  .loc{font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);}
  .rule{height:1px;background:var(--line);margin:0 0 26px;}

  .list{display:flex;flex-direction:column;gap:15px;}

  .card{
    background:var(--paper);border:1px solid var(--line);border-radius:7px;overflow:hidden;
    transition:box-shadow .4s,border-color .4s,background .4s;
  }
  .card:hover{box-shadow:0 16px 40px -28px rgba(64,75,48,.55);border-color:var(--line2);}
  .card.open{border-color:var(--green);box-shadow:0 20px 48px -28px rgba(64,75,48,.6);}
  .card--sig{background:linear-gradient(180deg,#f0f1e6,#ecebde);}
  .card--sig .num{background:var(--green);}

  .cardhead{all:unset;display:flex;width:100%;cursor:pointer;align-items:stretch;}
  .cardhead:focus-visible{outline:2px solid var(--green);outline-offset:-3px;}

  .thumb{position:relative;flex:0 0 196px;align-self:stretch;overflow:hidden;background:#dcdacc;}
  .thumb img{width:100%;height:100%;object-fit:cover;filter:saturate(.95) contrast(1.02);transition:transform .7s ease;display:block;}
  .card:hover .thumb img{transform:scale(1.045);}
  .thumb::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(64,75,48,0) 72%,rgba(64,75,48,.12));}
  .num{position:absolute;top:13px;left:13px;font-family:var(--sans);font-size:13px;font-weight:500;color:#f3f2ea;background:rgba(64,75,48,.66);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px);}

  .info{flex:1;padding:24px 28px 19px;display:flex;flex-direction:column;min-width:0;}
  .info-top{display:flex;gap:28px;align-items:flex-start;}
  .titleblock{flex:1;min-width:0;}
  .tag{display:inline-block;font-family:var(--sans);font-size:13px;letter-spacing:2.5px;text-transform:uppercase;color:var(--green);margin-bottom:8px;font-weight:500;}
  body.lang-ja .tag,body.lang-zh .tag,body.lang-ko .tag{letter-spacing:1.5px;}
  .cname{font-family:var(--serif);font-weight:600;font-size:30px;line-height:1.06;letter-spacing:.2px;margin-bottom:11px;color:var(--ink);}
  body.lang-ja .cname,body.lang-zh .cname,body.lang-ko .cname{font-weight:600;}

  .desc{font-size:17px;line-height:1.6;color:var(--soft);max-width:640px;font-weight:300;text-wrap:pretty;}
  body.lang-ja .desc,body.lang-zh .desc,body.lang-ko .desc{font-weight:400;word-break:keep-all;line-break:strict;}
  .desc .noms{color:var(--soft);font-weight:700;font-style:normal;}

  .pricing{flex:0 0 auto;text-align:right;padding-top:2px;border-left:1px solid var(--line);padding-left:26px;min-width:134px;}
  .dur-lab{font-family:var(--sans);font-size:14px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:9px;}
  body.lang-ja .dur-lab,body.lang-zh .dur-lab,body.lang-ko .dur-lab{letter-spacing:.5px;}
  .krw{font-family:var(--serif);font-size:32px;font-weight:600;line-height:1.05;color:var(--deep);letter-spacing:.2px;}
  body.lang-ja .krw, body.lang-zh .krw, body.lang-ko .krw{font-size:29px;}
  .usd{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;line-height:1;color:var(--deep);margin-top:4px;letter-spacing:.3px;}
  /* 번체·한국어: 둘째 줄(달러) 숨김, 원화만 표시 */
  body.lang-zh .usd, body.lang-ko .usd{display:none;}

  .expandcue{margin-top:17px;padding-top:14px;border-top:1px dashed var(--line2);display:flex;align-items:center;gap:9px;color:var(--green);}
  .cue-text{font-family:var(--sans);font-size:14px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500;}
  body.lang-ja .cue-text,body.lang-zh .cue-text,body.lang-ko .cue-text{letter-spacing:.5px;}
  .chev{display:flex;transition:transform .4s cubic-bezier(.2,.8,.2,1);}
  .card.open .chev{transform:rotate(180deg);}

  .breakdown{display:grid;grid-template-rows:0fr;transition:grid-template-rows .45s cubic-bezier(.3,.8,.3,1);}
  .card.open .breakdown{grid-template-rows:1fr;}
  .bd-inner{overflow:hidden;background:var(--paper2);border-top:1px solid var(--line);}
  .bd-label{display:block;font-family:var(--sans);font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);padding:20px 28px 6px 224px;}
  body.lang-ja .bd-label,body.lang-zh .bd-label,body.lang-ko .bd-label{letter-spacing:1px;}
  .steps{list-style:none;display:flex;flex-wrap:wrap;gap:11px 14px;padding:10px 30px 26px 224px;counter-reset:s;}
  .step{position:relative;font-size:16px;color:var(--ink);padding:9px 17px 9px 34px;background:var(--paper);border:1px solid var(--line);border-radius:40px;letter-spacing:.2px;counter-increment:s;}
  .step::before{content:counter(s,decimal-leading-zero);position:absolute;left:13px;top:50%;transform:translateY(-50%);font-family:var(--sans);font-size:11px;color:var(--green);font-weight:500;}
  .orstep{display:flex;align-items:center;font-size:13px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;padding:0 2px;}

  footer.foot{margin-top:34px;display:flex;justify-content:space-between;align-items:center;font-family:var(--sans);font-size:13px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;gap:16px;}
  body.lang-ja footer.foot,body.lang-zh footer.foot,body.lang-ko footer.foot{letter-spacing:.5px;}
  footer .mid{font-family:var(--serif);font-style:italic;letter-spacing:.3px;text-transform:none;font-size:16px;color:var(--soft);text-align:center;}
  body.lang-ja footer .mid,body.lang-zh footer .mid,body.lang-ko footer .mid{font-style:normal;}

  @media (max-width:760px){
    .stage{padding:24px 18px 34px;}
    .info-top{flex-direction:column;gap:16px;}
    .pricing{border-left:0;padding-left:0;text-align:left;}
    .krw{display:inline-block;}
    .usd{display:inline-block;margin-left:14px;margin-top:0;}
    body.lang-zh .usd, body.lang-ko .usd{display:none;}
    .bd-label,.steps{padding-left:24px;}
    .thumb{flex-basis:118px;}
    header.head{gap:16px;}
    .langbtn{padding:7px 13px;font-size:12px;}
  }
</style>
</head>

acial", "ja": "ミニフェイシャル", "zh": "迷你臉部護理", "ko": "미니 페이셜"}}], "jpy": "24,000円"}]};
    let LANG = 'en';

    function buildCard(c, idx){
      const sig = c.sig ? ' card--sig' : '';
      let stepsHtml = '';
      for(const it of c.items){
        if(it.or){ stepsHtml += '<li class="orstep"><span>'+DATA.or[LANG]+'</span></li>'; }
        else { stepsHtml += '<li class="step">'+it.t[LANG]+'</li>'; }
      }
      const hideTxt = DATA.ui.hide[LANG];
      return `
      <article class="card${sig}" data-idx="${idx}">
        <button class="cardhead" aria-expanded="false" aria-controls="bd${idx}">
          <div class="thumb"><img src="data:image/jpeg;base64,${c.img}" alt=""><span class="num">${c.num}</span></div>
          <div class="info">
            <div class="info-top">
              <div class="titleblock">
                <span class="tag">${c.tag[LANG]}</span>
                <h2 class="cname">${c.name[LANG]}</h2>
                <p class="desc">${c.desc[LANG]}</p>
              </div>
              <div class="pricing">
                <div class="dur-lab">${c.dur[LANG]}</div>
                <div class="krw">${c.krw}</div>
                <div class="usd">${LANG==='ja' ? c.jpy : c.usd}</div>
              </div>
            </div>
            <div class="expandcue">
              <span class="cue-text" data-cue>${DATA.ui.view[LANG]}</span>
              <span class="chev" aria-hidden="true"><svg viewBox="0 0 16 16" width="18" height="18"><path d="M4 6l4 4 4-4" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
            </div>
          </div>
        </button>
        <div class="breakdown" id="bd${idx}" role="region">
          <div class="bd-inner">
            <span class="bd-label">${DATA.ui.breakdown[LANG]}</span>
            <ol class="steps">${stepsHtml}</ol>
          </div>
        </div>
      </article>`;
    }

    function render(){
      document.body.className = 'lang-'+LANG;
      // UI labels
      document.querySelectorAll('[data-ui]').forEach(function(el){
        el.textContent = DATA.ui[el.getAttribute('data-ui')][LANG];
      });
      // remember open card
      const openIdx = document.querySelector('.card.open') ? document.querySelector('.card.open').getAttribute('data-idx') : null;
      const list = document.getElementById('list');
      list.innerHTML = DATA.courses.map(buildCard).join('');
      bindCards();
      if(openIdx !== null){
        const card = list.querySelector('.card[data-idx="'+openIdx+'"]');
        if(card){ card.classList.add('open'); updateCue(card,true); card.querySelector('.cardhead').setAttribute('aria-expanded','true'); }
      }
    }

    function updateCue(card, open){
      const cue = card.querySelector('[data-cue]');
      cue.textContent = DATA.ui.view[LANG] + (open ? DATA.ui.hide[LANG] : '');
    }

    function bindCards(){
      document.querySelectorAll('.cardhead').forEach(function(btn){
        btn.addEventListener('click', function(){
          const card = btn.closest('.card');
          const open = card.classList.contains('open');
          document.querySelectorAll('.card.open').forEach(function(c){
            if(c!==card){ c.classList.remove('open'); c.querySelector('.cardhead').setAttribute('aria-expanded','false'); updateCue(c,false); }
          });
          card.classList.toggle('open', !open);
          btn.setAttribute('aria-expanded', String(!open));
          updateCue(card, !open);
        });
      });
    }

    document.getElementById('langbar').addEventListener('click', function(e){
      const b = e.target.closest('.langbtn');
      if(!b) return;
      LANG = b.getAttribute('data-lang');
      document.querySelectorAll('.langbtn').forEach(x=>x.classList.toggle('active', x===b));
      render();
    });

    render();
  </script>
